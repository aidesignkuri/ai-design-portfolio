<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- K vertical bar / quill shaft -->
  <path d="M4 3 Q6 2 8 3 L8 27 Q7 29 5 29 Q3 28 4 26 Z" fill="#2D6A4F"/>
  <!-- Quill nib -->
  <path d="M4 27 L6 31 L9 27 Z" fill="#1F4D3A"/>

  <!-- Feather upper arm: quill pen shape
       outer edge: sweeps up-right to pointed tip
       inner edge: returns lower with gentle concave notch near base -->
  <path d="
    M 9 17
    C 10 9 15 5 21 3
    C 24 2 28 2 28 2
    C 25 5 21 8 18 12
    C 15 15 12 17 9 18
    C 10 17 10 16 9 17
    Z
  " fill="#52B788"/>

  <!-- Rachis (feather spine) for depth -->
  <line x1="9" y1="17" x2="26" y2="4" stroke="#2D6A4F" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

  <!-- K lower arm / quill lower vane -->
  <path d="M8 19 L25 30 L20 30 L8 22 Z" fill="#2D6A4F"/>
</svg>
