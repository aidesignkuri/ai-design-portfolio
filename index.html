// ─── tweaks-panel.jsx ────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;

  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}

    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}

  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;

    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}

    outline:none;color:inherit;-moz-appearance:textfield}
  .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{
    -webkit-appearance:none;margin:0}
  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}

    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}

  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport)
      : null;
    if (ro) ro.observe(document.documentElement);
    else window.addEventListener('resize', clampToViewport);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clampToViewport); };
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
      </div>
    </TweakRow>
  );
}
function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
      </select>
    </TweakRow>
  );
}
function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder} onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakColor,
});
</script>

<script type="text/babel">
// ─── components.jsx ──────────────────────────────────────────────────────────

const { useState, useEffect, useRef, useMemo } = React;

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    if (!("IntersectionObserver" in window)) {
      els.forEach((el) => el.classList.add("in"));
      return;
    }
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      },
      { threshold: 0.12, rootMargin: "0px 0px -40px 0px" }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function smoothScrollTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 24, behavior: "smooth" });
}

function LeafMark({ size = 28, color = "var(--green)" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <path d="M5 27c0-12 8-20 22-22-1 14-9 22-22 22Z" fill={color} />
      <path d="M5 27C9 22 14 18 22 14" stroke="var(--bg)" strokeWidth="1.6" strokeLinecap="round" fill="none" />
    </svg>
  );
}

function Logo({ name = "AIデザイン工房" }) {
  return (
    <a href="#top" style={{ display: "inline-flex", alignItems: "center", gap: 10, color: "var(--ink)" }} onClick={(e) => { e.preventDefault(); smoothScrollTo("top"); }}>
      <LeafMark size={26} />
      <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: "0.02em" }}>{name}</span>
    </a>
  );
}

function PrimaryBtn({ children, onClick, href, radius = 999, ...rest }) {
  const style = {
    display: "inline-flex", alignItems: "center", gap: 10,
    padding: "16px 28px", background: "var(--green)", color: "#fff",
    borderRadius: radius, border: "none", fontSize: 16, fontWeight: 600,
    boxShadow: "0 8px 24px -8px rgba(45,106,79,0.45)",
    transition: "transform .2s ease, background .2s ease",
  };
  const Tag = href ? "a" : "button";
  return (
    <Tag href={href} onClick={onClick} style={style}
      onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.background = "var(--green-deep)"; }}
      onMouseLeave={(e) => { e.currentTarget.style.transform = "none"; e.currentTarget.style.background = "var(--green)"; }}
      {...rest}>
      {children}<ArrowRight />
    </Tag>
  );
}

function GhostBtn({ children, onClick, href, ...rest }) {
  const Tag = href ? "a" : "button";
  return (
    <Tag href={href} onClick={onClick} style={{
      display: "inline-flex", alignItems: "center", gap: 6, padding: "14px 4px",
      background: "transparent", color: "var(--green-deep)", border: "none",
      borderBottom: "1.5px solid var(--green-deep)", fontSize: 15, fontWeight: 500, borderRadius: 0,
    }} {...rest}>{children}</Tag>
  );
}

function ArrowRight({ size = 16 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function SectionLabel({ no, children }) {
  return (
    <div style={{ display: "inline-flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
      <span style={{ fontSize: 13, color: "var(--green)", fontWeight: 600, letterSpacing: "0.1em" }}>{no}</span>
      <span style={{ display: "inline-block", width: 28, height: 1, background: "var(--green)", opacity: 0.5 }} />
      <span style={{ fontSize: 13, color: "var(--ink-mute)", letterSpacing: "0.18em", textTransform: "uppercase" }}>{children}</span>
    </div>
  );
}

function SectionTitle({ children, jp, en }) {
  return (
    <h2 style={{ margin: 0, marginBottom: 32, fontWeight: 700, fontSize: "clamp(28px, 4vw, 44px)", letterSpacing: "-0.01em", lineHeight: 1.3 }}>
      {jp ? <span style={{ display: "block" }}>{jp}</span> : null}
      {en ? <span style={{ display: "block", fontFamily: "Fraunces, serif", fontStyle: "italic", fontWeight: 400, fontSize: 16, color: "var(--green)", letterSpacing: "0.04em", marginTop: 6 }}>{en}</span> : null}
      {children}
    </h2>
  );
}

function LeafDeco({ x, y, size = 80, rotate = 0, opacity = 0.15, color = "var(--green-light)" }) {
  return (
    <svg style={{ position: "absolute", left: x, top: y, transform: `rotate(${rotate}deg)`, opacity, pointerEvents: "none" }} width={size} height={size} viewBox="0 0 100 100" aria-hidden="true">
      <path d="M15 85C15 45 40 18 88 12C82 56 56 82 15 85Z" fill={color} />
      <path d="M15 85C28 70 45 55 75 38" stroke="var(--bg)" strokeWidth="2" strokeLinecap="round" fill="none" />
    </svg>
  );
}

function TopNav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });

<script type="text/babel">
// ─── app.jsx ──────────────────────────────────────────────────────────────────

const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroLayout": "split",
  "typography": "noto",
  "logoName": "AIデザイン工房",
  "accentTone": "soft"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useReveal();

  useEffect(() => {
    const map = { noto: "", maru: "maru", kaku: "kaku", klee: "klee" };
    document.body.dataset.typo = map[tweaks.typography] || "";
  }, [tweaks.typography]);

  useEffect(() => {
    const root = document.documentElement;
    if (tweaks.accentTone === "deep") {
      root.style.setProperty("--green", "#1F4D3A");
      root.style.setProperty("--green-light", "#3D9970");
      root.style.setProperty("--green-mist", "#DCE8DF");
    } else if (tweaks.accentTone === "soft") {
      root.style.setProperty("--green", "#52B788");
      root.style.setProperty("--green-light", "#95D5B2");
      root.style.setProperty("--green-mist", "#EAF4EC");
      root.style.setProperty("--green-deep", "#2D6A4F");
    } else {
      root.style.setProperty("--green", "#2D6A4F");
      root.style.setProperty("--green-light", "#52B788");
      root.style.setProperty("--green-mist", "#E6F0EA");
      root.style.setProperty("--green-deep", "#1F4D3A");
    }
  }, [tweaks.accentTone]);

  useEffect(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll(".reveal:not(.in)").forEach((el) => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) el.classList.add("in");
      });
    });
  }, [tweaks.heroLayout]);

  return (
    <>
      <TopNav />
      <main>
        <Hero layout={tweaks.heroLayout} />
        <About />
        <Services />
        <Works />
        <Process />
        <Contact />
      </main>
      <Footer name={tweaks.logoName} />
      <TweaksPanel title="Tweaks">
        <TweakSection label="Hero レイアウト" />
        <TweakRadio
          label="レイアウト"
          value={tweaks.heroLayout}
          onChange={(v) => setTweak("heroLayout", v)}
          options={[
            { value: "split", label: "左右分割" },
            { value: "centered", label: "中央寄せ" },
            { value: "wave", label: "波模様" },
          ]}
        />
        <TweakSection label="ビジュアル方向性" />
        <TweakRadio
          label="トーン"
          value={tweaks.accentTone}
          onChange={(v) => setTweak("accentTone", v)}
          options={[
            { value: "green", label: "標準" },
            { value: "deep", label: "深め" },
            { value: "soft", label: "柔らか" },
          ]}
        />
        <TweakSection label="日本語フォント" />
        <TweakSelect
          label="フォント"
          value={tweaks.typography}
          onChange={(v) => setTweak("typography", v)}
          options={[
            { value: "noto", label: "Noto Sans JP（標準）" },
            { value: "maru", label: "Zen Maru Gothic（丸み）" },
            { value: "kaku", label: "Zen Kaku Gothic New" },
            { value: "klee", label: "Klee One（手書き感）" },
          ]}
        />
        <TweakSection label="屋号" />
        <TweakText
          label="屋号"
          value={tweaks.logoName}
          onChange={(v) => setTweak("logoName", v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
